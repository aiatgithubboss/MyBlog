<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка Firebase</title>
<link rel="stylesheet" href="styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "ТВОЙ_КЛЮЧ",
    authDomain: "ТВОЙ_ДОМЕН",
    projectId: "ТВОЙ_ID",
    storageBucket: "ТВОЙ_BUCKET",
    messagingSenderId: "....",
    appId: "...."
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // пример: добавить товар
  async function addProduct() {
    await addDoc(collection(db, "products"), {
      name: "Телефон",
      price: 100
    });
  }

  // пример: получить данные
  async function loadProducts() {
    const snapshot = await getDocs(collection(db, "products"));
    snapshot.forEach(doc => {
      console.log(doc.id, doc.data());
    });
  }

  loadProducts();
    </script>

<header>
<h1>🛠 Firebase Админка</h1>
</header>

<main class="content-box">

<h2>Добавить новость</h2>

<input id="title" placeholder="Заголовок" style="width:100%;padding:10px;margin:5px 0;">
<textarea id="text" placeholder="Текст" style="width:100%;padding:10px;height:100px;"></textarea>

<button class="green-btn" onclick="addPost()">Добавить</button>

<hr>

<h2>Список</h2>
<div id="list"></div>

</main>

<script>
// 🔥 ВСТАВЬ СЮДА СВОЙ firebaseConfig
const firebaseConfig = {
    apiKey: "PASTE_HERE",
    authDomain: "PASTE_HERE",
    projectId: "PASTE_HERE",
    storageBucket: "PASTE_HERE",
    messagingSenderId: "PASTE_HERE",
    appId: "PASTE_HERE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addPost() {
    let title = document.getElementById("title").value;
    let text = document.getElementById("text").value;

    if (!title || !text) return alert("Заполни поля!");

    db.collection("posts").add({
        title: title,
        text: text,
        time: Date.now()
    });

    document.getElementById("title").value = "";
    document.getElementById("text").value = "";
}

function loadPosts() {
    db.collection("posts").orderBy("time","desc")
    .onSnapshot(snapshot => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        snapshot.forEach(doc => {
            let p = doc.data();

            list.innerHTML += `
                <div style="background:white;color:black;padding:10px;margin:10px;border-radius:10px;">
                    <h3>${p.title}</h3>
                    <p>${p.text}</p>
                </div>
            `;
        });
    });
}

loadPosts();
</script>

</body>
</html>
